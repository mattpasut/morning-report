<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Report</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --border: #2e2c28;
    --accent: #e8c547;
    --accent-dim: #b89d30;
    --text: #f0ede6;
    --muted: #7a7568;
    --success: #4caf7d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(232,197,71,0.08) 0%, transparent 60%);
  }

  .card {
    width: 100%;
    max-width: 520px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  .card-header {
    padding: 2rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.3rem;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--text);
  }

  .date-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  /* ── SECTIONS ── */
  .form-section {
    padding: 1.75rem 2rem;
    border-bottom: 1px solid var(--border);
  }

  .form-section:last-of-type {
    border-bottom: none;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.25rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
  }

  /* ── FIELDS ── */
  .fields {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
  }

  label {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .input-wrap { position: relative; }

  .prefix {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    color: var(--accent);
    pointer-events: none;
  }

  input[type="number"],
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type="number"] {
    padding: 0.75rem 0.9rem 0.75rem 2.2rem;
  }

  input[type="number"].no-prefix {
    padding-left: 0.9rem;
  }

  textarea {
    padding: 0.75rem 0.9rem;
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
    font-size: 0.88rem;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(232,197,71,0.08);
  }

  .hint {
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  /* ── FOOTER ── */
  .card-footer {
    padding: 1.5rem 2rem 2rem;
  }

  button {
    width: 100%;
    padding: 1rem;
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    border-radius: 3px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  button:hover { background: #f0d060; }
  button:active { transform: scale(0.99); }
  button.loading { pointer-events: none; background: var(--accent-dim); }

  /* ── SUCCESS ── */
  .success-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,14,12,0.92);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    z-index: 100;
  }

  .success-overlay.show { display: flex; }

  .check {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--success);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
  }

  .success-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: 0.06em;
    color: var(--text);
  }

  .success-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .reset-btn {
    margin-top: 0.5rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 0.6rem 1.4rem;
    width: auto;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }

  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 480px) {
    body { padding: 0; }
    .card { border-radius: 0; }
    .field-row { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  }
</style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <div>
      <div class="eyebrow">Daily Entry</div>
      <h1>Morning<br>Report</h1>
    </div>
    <div class="date-badge" id="dateBadge"></div>
  </div>

  <!-- DAILY METRICS -->
  <div class="form-section">
    <div class="section-title">Daily Metrics</div>
    <div class="fields">

      <div class="field-row">
        <div class="field">
          <label>Artwork Tickets</label>
          <div class="input-wrap">
            <input type="number" id="artworkTickets" class="no-prefix" min="0" placeholder="0">
          </div>
        </div>
        <div class="field">
          <label>Website Inquiries</label>
          <div class="input-wrap">
            <input type="number" id="websiteInquiries" class="no-prefix" min="0" placeholder="0">
          </div>
        </div>
      </div>

      <div class="field">
        <label>Cash on Hand</label>
        <div class="input-wrap">
          <span class="prefix">$</span>
          <input type="number" id="cashOnHand" min="0" step="0.01" placeholder="0.00">
        </div>
      </div>

      <div class="field">
        <label>Complaints / Reprints</label>
        <div class="input-wrap">
          <textarea id="complaints" placeholder="Describe any complaints or reprint requests…"></textarea>
        </div>
      </div>

    </div>
  </div>

  <!-- WEEKLY METRICS -->
  <div class="form-section">
    <div class="section-title">Weekly Metrics (Wednesday)</div>
    <div class="fields">

      <div class="field">
        <label>Large Order Followups Completed</label>
        <div class="input-wrap">
          <input type="number" id="largeOrderFollowups" class="no-prefix" min="0" placeholder="0">
        </div>
      </div>

      <div class="field">
        <label>60 Day Receivables</label>
        <div class="input-wrap">
          <textarea id="receivables60Day" placeholder="List any outstanding 60 day receivables…"></textarea>
        </div>
      </div>

      <div class="field">
        <label>Overtime Hours</label>
        <div class="input-wrap">
          <textarea id="overtimeHours" placeholder="Note any overtime hours worked this week…"></textarea>
        </div>
      </div>

    </div>
  </div>

  <div class="card-footer">
    <button id="submitBtn" onclick="handleSubmit()">Submit Report</button>
  </div>

</div>

<div class="success-overlay" id="successOverlay">
  <div class="check">✓</div>
  <div class="success-title">Report Submitted</div>
  <div class="success-sub" id="successTime"></div>
  <button class="reset-btn" onclick="resetForm()">Submit Another</button>
</div>

<script>
  const now = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateBadge').innerHTML =
    `${days[now.getDay()]}<br>${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzT6asngaaLPrb2Z_oQmc8j-8XW9f2X13UVz1Vph6yla0FIvT_fEHDwQOREejNkEntj/exec';

  function handleSubmit() {
    const artwork = document.getElementById('artworkTickets').value;
    const cash    = document.getElementById('cashOnHand').value;

    if (artwork === '' || cash === '') {
      const emptyField = artwork === '' ? 'artworkTickets' : 'cashOnHand';
      document.getElementById(emptyField).focus();
      document.getElementById(emptyField).style.borderColor = '#e05c5c';
      setTimeout(() => document.getElementById(emptyField).style.borderColor = '', 1500);
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');
    btn.textContent = 'Submitting…';

    const payload = {
      timestamp:           new Date().toISOString(),
      artworkTickets:      parseInt(artwork),
      cashOnHand:          parseFloat(cash).toFixed(2),
      complaints:          document.getElementById('complaints').value.trim() || 'None',
      websiteInquiries:    parseInt(document.getElementById('websiteInquiries').value) || 0,
      largeOrderFollowups: parseInt(document.getElementById('largeOrderFollowups').value) || 0,
      receivables60Day:    document.getElementById('receivables60Day').value.trim() || 'None',
      overtimeHours:       document.getElementById('overtimeHours').value.trim() || 'None'
    };

    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(() => {
      btn.classList.remove('loading');
      btn.textContent = 'Submit Report';
      const t = new Date();
      document.getElementById('successTime').textContent =
        `Logged at ${t.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
      document.getElementById('successOverlay').classList.add('show');
    })
    .catch(err => {
      btn.classList.remove('loading');
      btn.textContent = 'Submit Report';
      alert('Submission failed — check your connection and try again.\n\n' + err.message);
    });
  }

  function resetForm() {
    ['artworkTickets','cashOnHand','websiteInquiries',
     'largeOrderFollowups','receivables60Day','overtimeHours','complaints']
      .forEach(id => {
        const el = document.getElementById(id);
        el.value = '';
      });
    document.getElementById('successOverlay').classList.remove('show');
  }
</script>
</body>
</html>
